version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: taskflow_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-taskflow}
      POSTGRES_USER: ${DB_USER:-taskflow_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taskflow_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskflow_network

  redis:
    image: redis:7-alpine
    container_name: taskflow_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskflow_network

  web:
    build: .
    container_name: taskflow_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn taskflow.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-False}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-your-secret-key-here}
      - DATABASE_URL=postgresql://${DB_USER:-taskflow_user}:${DB_PASSWORD:-secure_password_123}@db:5432/${DB_NAME:-taskflow}
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/me/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - taskflow_network

  celery_worker:
    build: .
    container_name: taskflow_celery_worker
    command: celery -A taskflow worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    environment:
      - DEBUG=${DEBUG:-False}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-your-secret-key-here}
      - DATABASE_URL=postgresql://${DB_USER:-taskflow_user}:${DB_PASSWORD:-secure_password_123}@db:5432/${DB_NAME:-taskflow}
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - web
    networks:
      - taskflow_network

  celery_beat:
    build: .
    container_name: taskflow_celery_beat
    command: celery -A taskflow beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      - DEBUG=${DEBUG:-False}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-your-secret-key-here}
      - DATABASE_URL=postgresql://${DB_USER:-taskflow_user}:${DB_PASSWORD:-secure_password_123}@db:5432/${DB_NAME:-taskflow}
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - web
    networks:
      - taskflow_network

volumes:
  postgres_data:
  redis_data:
  static_volume:

networks:
  taskflow_network:
    driver: bridge
