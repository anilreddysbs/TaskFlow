databases:
  - name: taskflow-db
    databaseName: taskflow
    user: taskflow_user
    plan: free

services:
  # Redis Cache & Celery Broker
  - type: redis
    name: taskflow-redis
    plan: free
    ipAllowList: [] # Only allow internal network traffic

  # Web Service for Django App
  - type: web
    name: taskflow-web
    runtime: docker
    dockerfilePath: Dockerfile
    dockerCommand: "sh -c \"python manage.py migrate && celery -A taskflow worker --loglevel=info --concurrency=1 & celery -A taskflow beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler & gunicorn taskflow.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120\""
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: "taskflow.settings"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: taskflow-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: taskflow-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: taskflow-redis
          property: connectionString
      - key: DB_SSL_REQUIRE
        value: "True"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
